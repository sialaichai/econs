<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prelim Chew Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js?v=1.0.1"></script>
	<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; }
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #e0e0e0; z-index: 10000; 
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); text-align: center;
            width: 90%; max-width: 400px;
        }
        .login-box h2 { margin-top: 0; color: #333; }
        .login-box p { color: #666; margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box;
            outline: none; transition: border 0.3s;
        }
        .login-box input:focus { border-color: #007bff; }
        .login-box button {
            width: 100%; padding: 12px; background: #007bff; color: white;
            border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer;
            transition: background 0.3s;
        }
        .login-box button:hover { background: #0056b3; }
        .error { 
            color: #d9534f; margin-top: 15px; display: none; 
            background: #f9d6d5; border: 1px solid #d9534f; padding: 10px;
            font-size: 13px; border-radius: 4px; text-align: left;
        }
        .status { color: #0275d8; margin-top: 15px; font-size: 14px; font-weight: 500; display: block; }

        #main-container { display: none; flex-direction: column; height: 100vh; }
        #upper-panel { flex: 1; display: flex; flex-direction: column; min-height: 150px; }
        #lower-panel { height: 300px; min-height: 100px; overflow-y: auto; background: white; }
        #dragger { height: 5px; background: #ccc; cursor: ns-resize; border-top: 1px solid #aaa; border-bottom: 1px solid #aaa; }
        
        #controls { 
            padding: 10px; background: #f4f4f4; display: flex; 
            align-items: center; gap: 10px; flex-wrap: wrap; 
            border-bottom: 1px solid #ddd; 
        }
        #pdf-viewer-container { flex: 1; background: #525659; }
        #pdf-viewer { width: 100%; height: 100%; border: none; }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f8f9fa; cursor: pointer; position: sticky; top: 0; user-select: none; }
        th:hover { background-color: #e2e6ea; }
        tbody tr:hover { background-color: #e2e6ea; cursor: pointer; }
        
        .dropdown-check-container { position: relative; display: inline-block; }
        .filter-button { 
            padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; 
            background: white; min-width: 60px; display: flex; 
            justify-content: space-between; align-items: center; cursor: pointer;
        }
        .dropdown-panel { 
            display: none; position: absolute; background: white; 
            border: 1px solid #ccc; box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            z-index: 100; min-width: 200px; padding: 10px; border-radius: 4px; 
        }
        .dropdown-list { max-height: 250px; overflow-y: auto; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .dropdown-list label { display: block; padding: 6px; cursor: pointer; }
        .dropdown-list label:hover { background-color: #f4f4f4; }
        .apply-button { 
            width: 100%; padding: 8px; background: #007bff; color: white; 
            border: none; border-radius: 4px; cursor: pointer;
        }
        .apply-button:hover { background-color: #0056b3; }
        
        #year-filter-btn, #jc-filter-btn, #paper-filter-btn, #question-filter-btn { min-width: 60px; }
        #topic-filter-btn { min-width: 300px; }

        #generate-html-btn { 
            background-color: #28a745; color: white; padding: 8px 12px; 
            border: none; border-radius: 4px; font-weight: bold; 
            cursor: pointer; font-size: 14px; 
        }
        #generate-html-btn:hover { background-color: #218838; }
        #file-count-display { font-weight: bold; color: #555; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Restricted Access</h2>
            <p>Enter password to unlock prelim papers</p>
			<p>Clear Browser Cache for latest updates</p>
            <input type="password" id="pass-input" placeholder="Password" onkeypress="handleEnter(event)">
            <button onclick="unlock()">Login</button>
            <div id="status-msg" class="status">Initializing...</div>
            <div id="error-msg" class="error"></div>
        </div>
    </div>

    <div id="main-container">
        <div id="upper-panel">
            <div id="controls">
                <div class="dropdown-check-container">
                    <button id="year-filter-btn" class="filter-button">Year (<span id="year-filter-count">0</span>)</button>
                    <div id="year-filter-panel" class="dropdown-panel">
                        <div id="year-filter-list" class="dropdown-list"></div>
                        <button id="year-filter-apply" class="apply-button">Apply</button>
                    </div>
                </div>
				
                <div class="dropdown-check-container">
                    <button id="jc-filter-btn" class="filter-button">PCode/JC (<span id="jc-filter-count">0</span>)</button>
                    <div id="jc-filter-panel" class="dropdown-panel">
                        <div id="jc-filter-list" class="dropdown-list"></div>
                        <button id="jc-filter-apply" class="apply-button">Apply</button>
                    </div>
                </div>

                <div class="dropdown-check-container">
                    <button id="paper-filter-btn" class="filter-button">Paper (<span id="paper-filter-count">0</span>)</button>
                    <div id="paper-filter-panel" class="dropdown-panel">
                        <div id="paper-filter-list" class="dropdown-list"></div>
                        <button id="paper-filter-apply" class="apply-button">Apply</button>
                    </div>
                </div>

                <div class="dropdown-check-container">
                    <button id="question-filter-btn" class="filter-button">Question (<span id="question-filter-count">0</span>)</button>
                    <div id="question-filter-panel" class="dropdown-panel">
                        <div id="question-filter-list" class="dropdown-list"></div>
                        <button id="question-filter-apply" class="apply-button">Apply</button>
                    </div>
                </div>

				<div class="dropdown-check-container">
				  <button id="topic-filter-btn" class="filter-button">Topic (<span id="topic-filter-count">0</span>)</button>
				  <div id="topic-filter-panel" class="dropdown-panel">
				    <div id="topic-filter-list" class="dropdown-list"></div>
				    <button id="topic-filter-apply" class="apply-button">Apply</button>
				  </div>
				</div>
				<label style="display:inline-flex;align-items:center;margin-left:10px;font-size:14px;">
				  <input type="checkbox" id="include-other-topics" />
				  <span style="margin-left:4px;">“Other Topics”</span>
				</label>
                
                <button id="generate-html-btn">HTML</button>
                <button id="merge-pdf-btn" style="background-color: #007bff; color: white; padding: 8px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px;">PDFs</button>
                <button id="download-zip-btn" style="background-color: #ff9800; color: white; padding: 8px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px;">ZIP</button>
				<span id="file-count-display"></span>
            </div>
            <div id="pdf-viewer-container"><iframe id="pdf-viewer" src="" frameborder="0"></iframe></div>
        </div>

        <div id="dragger"></div>

        <div id="lower-panel">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>Filename</th>
                        <th>Year</th>
                        <th>Pcode/JC</th>
                        <th>Paper</th>
                        <th>Question</th>
                        <th>Main Topic</th>
                        <th>Other Topics</th>
                    </tr>
                </thead>
                <tbody id="data-table-body"></tbody>
            </table>
        </div>
    </div> 

    <script>
    const PAYLOAD_FILE = 'payload.enc';
    const UPDATES_FILE = 'updates.json'; 
    let PDF_FOLDER = ''; 
    let ENCRYPTED_TEXT = '';

    const statusEl = document.getElementById('status-msg');
    const errorEl = document.getElementById('error-msg');

    function logError(msg) {
        errorEl.style.display = 'block';
        errorEl.textContent = msg;
        statusEl.style.display = 'none';
        console.error(msg);
    }

    function logStatus(msg) {
        statusEl.textContent = msg;
        statusEl.style.display = 'block';
        errorEl.style.display = 'none';
    }

    fetch(PAYLOAD_FILE)
        .then(res => {
            if(!res.ok) throw new Error(`Fetch Failed: ${res.status} ${res.statusText}`);
            return res.text();
        })
        .then(text => { 
            if (!text || text.length === 0) throw new Error("payload.enc is EMPTY.");
            ENCRYPTED_TEXT = text.trim();
            logStatus(`Ready.`);
            const savedPass = sessionStorage.getItem('prelim_session_key');
            if(savedPass) {
                document.getElementById('pass-input').value = savedPass;
                unlock(true); 
            }
        })
        .catch(err => { logError("Error: Could not find 'payload.enc'."); });

    function handleEnter(e) { if(e.key === 'Enter') unlock(); }

    function unlock(isAuto = false) {
        const passInput = document.getElementById('pass-input');
        const pass = passInput.value;
        if (!pass) return;
        if (!ENCRYPTED_TEXT) return;

        setTimeout(() => {
            try {
                const bytes = CryptoJS.AES.decrypt(ENCRYPTED_TEXT, pass);
                if (bytes.sigBytes < 0) throw new Error("Decryption Key Mismatch.");
                let decryptedStr = bytes.toString(CryptoJS.enc.Utf8);
                if (!decryptedStr) throw new Error("Incorrect Password.");

                let bundle = JSON.parse(decryptedStr);
                sessionStorage.setItem('prelim_session_key', pass);
                PDF_FOLDER = bundle.secure_folder;
                let mainData = bundle.data;

                fetch(UPDATES_FILE)
                    .then(res => (res.status === 404 ? [] : res.json()))
                    .then(updateData => {
                        if(Array.isArray(updateData) && updateData.length > 0) mainData = mainData.concat(updateData);
                        startApp(mainData);
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('main-container').style.display = 'flex';
                    })
                    .catch(() => {
                        startApp(mainData);
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('main-container').style.display = 'flex';
                    });
            } catch (e) {
                if(isAuto) sessionStorage.removeItem('prelim_session_key');
                else logError(e.message);
            }
        }, 100);
    }

    function startApp(allData) {
        let selectedTopics = new Set();
        let selectedYears = new Set();
        let selectedJCs = new Set();
        let selectedPapers = new Set();
        let selectedQuestions = new Set();
        
        const tableBody = document.getElementById('data-table-body');
        const pdfViewer = document.getElementById('pdf-viewer');
        const fileCountDisplay = document.getElementById('file-count-display');
        
        allData = allData.map(item => {
            let q = (item.question || '').trim().replace(/\.pdf$/i, '').replace(/^q0+(\d)/i, 'q$1');
            return {
                filename: (item.filename || '').trim(),
                year: (item.year || '').trim(),
                Pcode: (item.PCode || item.Pcode || '').trim(),
                paper: (item.paper || '').trim(),
                question: q, 
                mainTheme: (item.mainTheme || '').trim(),
                otherThemes: Array.isArray(item.otherThemes) ? item.otherThemes.map(t => t.trim()).filter(Boolean) : 
                             (item.otherThemes ? item.otherThemes.split(',').map(t => t.trim()).filter(Boolean) : [])
            };
        });

        let currentFilteredData = [...allData]; 
        let currentSort = { column: 1, asc: false };
        const baseHeaders = ['Filename', 'Year', 'JC', 'Paper', 'Question', 'Main Topic', 'Other Topics'];
        
        document.querySelectorAll('#data-table th').forEach((th, index) => {
            th.addEventListener('click', () => {
                if (currentSort.column === index) currentSort.asc = !currentSort.asc;
                else { currentSort.column = index; currentSort.asc = false; }
                renderTable(currentFilteredData);
            });
        });

        populateDropdowns(allData);
        setupEventListeners(allData);
        renderTable(currentFilteredData);

        function populateDropdowns(data) {
            const getUniques = (mapper, sorter) => [...new Set(data.map(mapper).flat().filter(Boolean))].sort(sorter);
            const naturalSort = (a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
            
            const topics = getUniques(i => i.mainTheme, undefined); 
            const years = getUniques(i => i.year, (a, b) => parseInt(b) - parseInt(a));
            const jcs = getUniques(i => i.Pcode, undefined);
            const papers = getUniques(i => i.paper, undefined);
            const questions = getUniques(i => i.question, naturalSort);

            const setupList = (id, arr, cls) => {
                const el = document.getElementById(id);
                if(!el) return; el.innerHTML = '';
                arr.forEach(v => {
                    const l = document.createElement('label');
                    const c = document.createElement('input'); c.type='checkbox'; c.className=cls; c.value=v;
                    l.appendChild(c); l.appendChild(document.createTextNode(' '+v)); el.appendChild(l);
                });
            }
            setupList('topic-filter-list', topics, 'topic-checkbox');
            setupList('year-filter-list', years, 'year-checkbox');
            setupList('jc-filter-list', jcs, 'jc-checkbox');
            setupList('paper-filter-list', papers, 'paper-checkbox');
            setupList('question-filter-list', questions, 'question-checkbox');
        }

        function setupEventListeners(data) {
            const setup = (btnId, panelId, listId, applyId, set, cls) => {
                const btn = document.getElementById(btnId), panel = document.getElementById(panelId);
                const list = document.getElementById(listId), apply = document.getElementById(applyId);
                if(!btn) return;
                btn.addEventListener('click', () => panel.style.display = panel.style.display === 'block' ? 'none' : 'block');
                apply.addEventListener('click', () => {
                    set.clear(); list.querySelectorAll(`.${cls}:checked`).forEach(b => set.add(b.value));
                    btn.children[0].textContent = set.size; panel.style.display = 'none'; applyFilters(data);
                });
            };
            setup('topic-filter-btn', 'topic-filter-panel', 'topic-filter-list', 'topic-filter-apply', selectedTopics, 'topic-checkbox');
            setup('year-filter-btn', 'year-filter-panel', 'year-filter-list', 'year-filter-apply', selectedYears, 'year-checkbox');
            setup('jc-filter-btn', 'jc-filter-panel', 'jc-filter-list', 'jc-filter-apply', selectedJCs, 'jc-checkbox');
            setup('paper-filter-btn', 'paper-filter-panel', 'paper-filter-list', 'paper-filter-apply', selectedPapers, 'paper-checkbox');
            setup('question-filter-btn', 'question-filter-panel', 'question-filter-list', 'question-filter-apply', selectedQuestions, 'question-checkbox');

            document.addEventListener('click', (e) => {
                ['topic-filter-panel', 'year-filter-panel', 'jc-filter-panel', 'paper-filter-panel', 'question-filter-panel'].forEach(id => {
                    const p = document.getElementById(id);
                    if(p && !p.contains(e.target) && !e.target.closest('.filter-button')) p.style.display='none';
                });
            });

            document.getElementById('generate-html-btn').addEventListener('click', () => {
                const rows = tableBody.querySelectorAll('tr');
                if(rows.length > 100 && !confirm(`Generate report for ${rows.length} files?`)) return;
                const pdfBaseUrl = `https://sialaichai.github.io/econs/${PDF_FOLDER}/`;
                let html = `<!DOCTYPE html><html><head><title>Report</title><style>body{font-family:sans-serif;margin:20px;background:#f4f4f4}.pdf-section{margin-bottom:40px;background:#fff;padding:15px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}embed{width:100%;height:800px;border:1px solid #ccc}</style></head><body><h1>Filtered PDF Report</h1>`;
                rows.forEach(r => {
                    const fname = r.cells[0].textContent, year = r.cells[1].textContent, theme = r.cells[5].textContent;
                    html += `<div class='pdf-section'><div><b>${fname}</b> (${theme})</div><embed src='${pdfBaseUrl}${year}/${fname}' type='application/pdf' /></div>`;
                });
                html += `</body></html>`;
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([html], {type:'text/html'})); a.download = 'report.html'; a.click();
            });

            document.getElementById('merge-pdf-btn').addEventListener('click', async () => {
                const rows = Array.from(tableBody.querySelectorAll('tr'));
                if (rows.length === 0) return;
                const { PDFDocument, rgb, StandardFonts } = PDFLib;
                const mergedPdf = await PDFDocument.create();
                const font = await mergedPdf.embedFont(StandardFonts.HelveticaBold);
                const pdfBaseUrl = `https://sialaichai.github.io/econs/${PDF_FOLDER}/`;
                for (let r of rows) {
                    const fname = r.cells[0].textContent, year = r.cells[1].textContent;
                    const res = await fetch(`${pdfBaseUrl}${year}/${fname}`);
                    if (!res.ok) continue;
                    const sourcePdf = await PDFDocument.load(await res.arrayBuffer());
                    const banner = mergedPdf.addPage([sourcePdf.getPages()[0].getSize().width, 30]);
                    banner.drawText(`File: ${fname}`, { x: 15, y: 15, size: 10, font: font, color: rgb(1, 0, 0) });
                    (await mergedPdf.copyPages(sourcePdf, sourcePdf.getPageIndices())).forEach(p => mergedPdf.addPage(p));
                }
                const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([await mergedPdf.save()], {type:'application/pdf'})); link.download = 'merged.pdf'; link.click();
            });

            document.getElementById('download-zip-btn').addEventListener('click', async () => {
                const rows = Array.from(tableBody.querySelectorAll('tr'));
                if (rows.length === 0) return;
                const zip = new JSZip(), pdfBaseUrl = `https://sialaichai.github.io/econs/${PDF_FOLDER}/`;
                for (let r of rows) {
                    const fname = r.cells[0].textContent, year = r.cells[1].textContent;
                    const res = await fetch(`${pdfBaseUrl}${year}/${fname}`);
                    if (res.ok) zip.file(fname, await res.blob());
                }
                const content = await zip.generateAsync({type:"blob"});
                const link = document.createElement('a'); link.href = URL.createObjectURL(content); link.download = 'papers.zip'; link.click();
            });
        }

        function applyFilters(data) {
          let fd = data.filter(item => {
            if (selectedTopics.size > 0) {
              const inMain = selectedTopics.has(item.mainTheme);
              const inOther = document.getElementById('include-other-topics').checked && item.otherThemes.some(t => selectedTopics.has(t));
              if (!inMain && !inOther) return false;
            }
            if (selectedYears.size > 0 && !selectedYears.has(item.year)) return false;
            if (selectedJCs.size > 0 && !selectedJCs.has(item.Pcode)) return false;
            if (selectedPapers.size > 0 && !selectedPapers.has(item.paper)) return false;
            if (selectedQuestions.size > 0 && !selectedQuestions.has(item.question)) return false;
            return true;
          });
          currentFilteredData = fd;
          renderTable(fd);
        }

        function renderTable(data) {
            document.querySelectorAll('#data-table th').forEach((th, i) => {
                th.textContent = baseHeaders[i] + (currentSort.column === i ? (currentSort.asc ? ' ▲' : ' ▼') : '');
            });
            data.sort((a, b) => {
                const keys = ['filename', 'year', 'Pcode', 'paper', 'question', 'mainTheme', 'otherThemes'];
                let vA = a[keys[currentSort.column]], vB = b[keys[currentSort.column]];
                if (Array.isArray(vA)) { vA = vA.join(', '); vB = vB.join(', '); }
                return currentSort.asc ? String(vA).localeCompare(String(vB), undefined, {numeric: true}) : String(vB).localeCompare(String(vA), undefined, {numeric: true});
            });
            tableBody.innerHTML = '';
            data.slice(0, 500).forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${r.filename}</td><td>${r.year}</td><td>${r.Pcode}</td><td>${r.paper}</td><td>${r.question}</td><td>${r.mainTheme}</td><td>${r.otherThemes.join(', ')}</td>`;
                tr.addEventListener('click', () => pdfViewer.src = `${PDF_FOLDER}/${r.year}/${r.filename}`);
                tableBody.appendChild(tr);
            });
            fileCountDisplay.textContent = `${data.length} files found`;
        }

        const dragger = document.getElementById('dragger'), lowerPanel = document.getElementById('lower-panel');
        let isD = false;
        dragger.addEventListener('mousedown', () => { isD = true; });
        document.addEventListener('mouseup', () => { isD = false; });
        document.addEventListener('mousemove', (e) => { if(isD) lowerPanel.style.height = `${window.innerHeight - e.clientY}px`; });
    }
    </script>
</body>
</html>
